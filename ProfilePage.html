        }
        .profile-input:focus {

        }
        .section-title {
            font-size: 0.75rem;
            font-weight: 800;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.1em;

        }
    </style>
</head>
<body class="min-h-screen">

  <!-- SH ICON = DROPDOWN BUTTON -->

</button>

  <!-- Dropdown Menu -->

<div class="container"></div>
    
    <div class="max-w-7xl mx-auto flex flex-col lg:flex-row gap-8 p-4 md:p-8">
        
        <aside class="w-full lg:w-1/4 space-y-6">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 text-center">
                <img id="profileAvatar"
     src=""
     class="w-24 h-24 rounded-full mx-auto mb-4"
     alt="Profile">

<h2 id="profileStudentName"
    class="text-xl font-bold text-gray-800">
</h2>

                <p id="sidebarEmail" class="text-[10px] text-emerald-600 font-medium uppercase mb-6 tracking-widest break-all">sanika.hande@example.com</p>
                
                <div class="grid grid-cols-3 gap-2 border-t border-gray-50 pt-6">
                    <div><p id="sidebarRoom" class="font-bold text-gray-700">205</p><p class="text-[10px] text-gray-400 uppercase">Room</p></div>
                    <div class="border-x border-gray-100"><p id="sidebarBlock" class="font-bold text-gray-700">B</p><p class="text-[10px] text-gray-400 uppercase">Block</p></div>
                    <div><p id="sidebarFloor" class="font-bold text-gray-700">2nd</p><p class="text-[10px] text-gray-400 uppercase">Floor</p></div>
                </div>
            </div>

            
        </aside>

        <main class="flex-1">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-6 border-b border-gray-50 flex justify-between items-center bg-white">
                    <h3 class="text-xl font-bold text-gray-800 tracking-tight">Editing Profile</h3>
                    <button id="mainActionBtn" onclick="handleModeSwitch()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-2.5 rounded-xl font-semibold transition-all">
                        Edit Profile
                    </button>
                </div>

                <form id="profileForm" class="p-6 md:p-12 max-w-2xl mx-auto space-y-8">
                    
                    <div class="space-y-6">
                        <h4 class="section-title">Hostel Details</h4>
                        
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Hostel ID *</label>
                            <input type="text" id="hostelId" value="HST-A-01" disabled class="profile-input">
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Hostel Name *</label>
                            <input type="text" id="hostelName" value="Vivekananda Boys Hostel" disabled class="profile-input">
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Room Number *</label>
                            <input type="text" id="roomNo" value="Room 205" disabled class="profile-input">
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Room Type *</label>
                            <input type="text" id="roomType" value="Double Sharing" disabled class="profile-input">
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Floor/Block *</label>
                            <input type="text" id="floorBlock" value="2nd Floor, Block B" disabled class="profile-input">
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Warden Name</label>
                            <input type="text" id="wardenName" value="Mr. Sharma" disabled class="profile-input">
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Contact Number</label>
                            <input type="text" id="contactNum" value="+91 98765 43210" disabled class="profile-input">
                        </div>
                    </div>

                    <div class="space-y-6 pt-4">
                        <h4 class="section-title">Roommate Info</h4>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Roommate Name</label>
                            <input type="text" id="roommateName" value="Rahul Kumar" disabled class="profile-input">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Roommate Contact</label>
                            <input type="text" id="roommateContact" value="+91 98765 43211" disabled class="profile-input">
                        </div>
                    </div>

                    
            </div>
        </main>
    </div>
</div>

    <script>
        window.onload = function () {

    // ✅ get email from login
    const loginEmail = localStorage.getItem("loggedInEmail");

    if (loginEmail) {
        document.getElementById("sidebarEmail").innerText = loginEmail;
    }

    // hostel-related data
    const data = JSON.parse(localStorage.getItem("studentHostelData"));

    if (!data) return;

    if (data.roomNo) {
        document.getElementById("sidebarRoom").innerText =
            data.roomNo.replace(/[^0-9]/g, "");
    }

    if (data.floorBlock) {
        const parts = data.floorBlock.split(",");
        document.getElementById("sidebarFloor").innerText =
            parts[0].trim().split(" ")[0] || "2nd";

        if (parts[1]) {
            document.getElementById("sidebarBlock").innerText =
                parts[1].trim().split(" ")[1] || "B";
        }
    }
};
;

        function handleModeSwitch() {
            const btn = document.getElementById('mainActionBtn');
            const inputs = document.querySelectorAll('.profile-input');
            
            if (btn.innerText === "Edit Profile") {
                btn.innerText = "Save Changes";
                btn.classList.replace('bg-emerald-600', 'bg-blue-600');
                inputs.forEach(input => input.disabled = false);
            } else {
                const studentData = {
                    hostelId: document.getElementById('hostelId').value,
                    hostelName: document.getElementById('hostelName').value,
                    roomNo: document.getElementById('roomNo').value,
                    roomType: document.getElementById('roomType').value,
                    floorBlock: document.getElementById('floorBlock').value,
                    warden: document.getElementById('wardenName').value, // Saved Warden Name
                    contact: document.getElementById('contactNum').value,
                    roommateName: document.getElementById('roommateName').value,
                    roommateContact: document.getElementById('roommateContact').value,
                     
                };

                localStorage.setItem('studentHostelData', JSON.stringify(studentData));

                btn.innerText = "Edit Profile";
                btn.classList.replace('bg-blue-600', 'bg-emerald-600');
                inputs.forEach(input => input.disabled = true);
                alert(" Details updated Successfully! ");
            }
        }

        function handleLogout() {
    if (confirm("Are you sure you want to logout?")) {
        localStorage.removeItem('studentHostelData');
        localStorage.removeItem("loggedInEmail");
        localStorage.removeItem("loggedInStudentId");
        alert("Logged out successfully!");
        window.location.href = "loginpageS.html";
    }
}

    </script>
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script>
document.addEventListener("DOMContentLoaded", function () {

  const studentName  = localStorage.getItem("loggedInStudentName");
  const studentEmail = localStorage.getItem("loggedInEmail");
  const initials = studentName
  .split(" ")
  .map(n => n[0])
  .join("")
  .toUpperCase();

document.getElementById("profileInitialBtn").innerText = initials;


  if (!studentName) {
    window.location.href = "loginpageS.html";
    return;
  }

  // Name set
  document.getElementById("profileStudentName").innerText = studentName;

  // Email set
  if (studentEmail) {
    document.getElementById("sidebarEmail").innerText = studentEmail;
  }

  // Avatar dynamic
  document.getElementById("profileAvatar").src =
    `https://ui-avatars.com/api/?name=${encodeURIComponent(studentName)}&background=059669&color=fff`;

});
</script>
