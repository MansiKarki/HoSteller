    <script>
  function generateStudentId() {
    const year = new Date().getFullYear();
    const random = Math.floor(10000 + Math.random() * 90000);
    return `STD-${year}-${random}`;
  }

  // Auto-generate when page loads
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("studentId").value = generateStudentId();
  });
</script>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>Student Login</h2>
                <p>Welcome back! Please login to your account</p>
            </div>
           
            



            <div class="login-body">
                <form id="loginForm">
                    <!-- ✅ First Name -->
    <div class="form-group">
      <label class="form-label" for="firstName">First Name</label>
      <div class="input-group">
        <input type="text" class="form-control" id="firstName"
               placeholder="Enter your first name" required>
        <span class="input-group-text">
          <i class="fas fa-user"></i>
        </span>
      </div>
    </div>

    <!-- ✅ Last Name -->
    <div class="form-group">
      <label class="form-label" for="lastName">Last Name</label>
      <div class="input-group">
        <input type="text" class="form-control" id="lastName"
               placeholder="Enter your last name" required>
        <span class="input-group-text">
          <i class="fas fa-user"></i>
        </span>
      </div>
    </div>
                 <div class="form-group">
  <label class="form-label" for="studentId">Student ID</label>
  <div class="input-group">
    <input 
      type="text" 
      class="form-control" 
      id="studentId" 
      placeholder="Auto-generated Student ID"
      readonly
    >
    <span class="input-group-text">
      <i class="fas fa-user"></i>
    </span>
  </div>
</div>

                    <div class="form-group">
                        <label class="form-label" for="studentId">Student Email</label>
                        <div class="input-group">
                            <input type="email" class="form-control" id="email" placeholder="Enter student email" required>
                            <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                            <span class="input-group-text" style="cursor: pointer;" onclick="togglePassword()">
                                <i class="fas fa-eye" id="toggleIcon"></i>
                            </span>
                        </div>
                    </div>

                    <div class="forgot-password">
                        <a href="#">Forgot Password?</a>
                    </div>

                    <div class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <label for="rememberMe" style="margin: 0; cursor: pointer;">Remember me</label>
                    </div>
<button type="submit" class="btn btn-login">Login</button>

                    <div class="signup-link">
                        Don't have an account? <a href="#">Sign up here</a>
                    </div>
                </form>
            </div>

    <script>
document.getElementById("loginForm").addEventListener("submit", function (e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const studentId = document.getElementById("studentId").value;
    const firstName = document.getElementById("firstName").value;
    const lastName  = document.getElementById("lastName").value;

    const fullName = firstName + " " + lastName;

    // ✅ Save login data
    localStorage.setItem("loggedInEmail", email);
    localStorage.setItem("loggedInStudentId", studentId);
    localStorage.setItem("loggedInStudentName", fullName);

    // redirect after login
    window.location.href = "Sdashboard.html";
});
</script>
