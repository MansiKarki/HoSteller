<!DOCTYPE html>
<html lang="en">
<head>
  <title>Hosteller – Set New Admin Password</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="logo-removebg-preview.png">

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome CDN -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .login-container {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      max-width: 450px;
      width: 100%;
      overflow: hidden;
    }

    .login-header {
      padding: 30px;
      text-align: center;
      border-bottom: 1px solid #eee;
    }

    .login-header h2 {
      margin: 0;
      font-size: 26px;
      font-weight: 600;
      color: #16a34a;
    }

    .login-header p {
      margin-top: 8px;
      font-size: 14px;
      color: #555;
    }

    .login-body {
      padding: 35px;
    }

    .form-label {
      font-weight: 500;
      color: #333;
      margin-bottom: 6px;
    }

    .form-control {
      border-radius: 10px;
      padding: 12px 14px;
      border: 2px solid #e0e0e0;
      transition: 0.3s;
    }

    .form-control:focus {
      border-color: #16a34a;
      box-shadow: 0 0 0 0.15rem rgba(22,163,74,0.25);
    }

    .input-group-text {
      background: transparent;
      border: 2px solid #e0e0e0;
      border-left: none;
      border-radius: 0 10px 10px 0;
      cursor: pointer;
      color: #16a34a;
    }

    .input-group .form-control {
      border-right: none;
      border-radius: 10px 0 0 10px;
    }

    .btn-reset {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #16a34a;
      background: #fff;
      color: #16a34a;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn-reset:hover {
      background: #16a34a;
      color: #fff;
      box-shadow: 0 6px 15px rgba(22,163,74,0.35);
      transform: translateY(-2px);
    }

    .password-info {
      font-size: 12px;
      color: #666;
      margin-bottom: 15px;
    }

    .status-message {
      display: none;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      text-align: center;
      margin-bottom: 15px;
    }

    .status-success {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .status-error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }
  </style>
</head>

<body>

<div class="login-container">
  <div class="login-card">

    <div class="login-header">
      <h2>Create New Password</h2>
      <p>Set a strong password for your admin account</p>
    </div>

    <div class="login-body">
      <div id="statusMsg" class="status-message"></div>

      <form id="resetForm">

        <div class="mb-3">
          <label class="form-label">New Password</label>
          <div class="input-group">
            <input type="password" id="newPassword" class="form-control" required>
            <span class="input-group-text" onclick="togglePassword('newPassword','icon1')">
              <i class="fa fa-eye" id="icon1"></i>
            </span>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <div class="input-group">
            <input type="password" id="confirmPassword" class="form-control" required>
            <span class="input-group-text" onclick="togglePassword('confirmPassword','icon2')">
              <i class="fa fa-eye" id="icon2"></i>
            </span>
          </div>
        </div>

        <div class="password-info">
          <i class="fa fa-info-circle me-1"></i>
          Minimum 8 characters with letters & numbers
        </div>

        <button type="submit" class="btn-reset">
          Update Password
        </button>

        <div class="text-center mt-3">
          <a href="loginpageA.html" class="text-muted text-decoration-none small">
            Cancel & go back to login
          </a>
        </div>

      </form>
    </div>
  </div>
</div>

<script>
  function togglePassword(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);

    if (input.type === "password") {
      input.type = "text";
      icon.classList.replace("fa-eye", "fa-eye-slash");
    } else {
      input.type = "password";
      icon.classList.replace("fa-eye-slash", "fa-eye");
    }
  }

  document.getElementById("resetForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const password = document.getElementById("newPassword").value;
  const confirm = document.getElementById("confirmPassword").value;
  const msg = document.getElementById("statusMsg");
  const btn = this.querySelector("button");

  msg.style.display = "none";
  msg.className = "status-message";

  if (password !== confirm) {
    msg.textContent = "Passwords do not match.";
    msg.classList.add("status-error");
    msg.style.display = "block";
    return;
  }

  if (password.length < 8) {
    msg.textContent = "Password must be at least 8 characters.";
    msg.classList.add("status-error");
    msg.style.display = "block";
    return;
  }

  btn.innerHTML = '<i class="fa fa-spinner fa-spin me-2"></i>Updating...';
  btn.disabled = true;

  // (Backend call will go here later)

  setTimeout(() => {
    msg.innerHTML = `
      <strong>Password updated successfully!</strong><br>
      Now go to the 
      Login page and try your new password.
    `;
    msg.classList.add("status-success");
    msg.style.display = "block";

    btn.innerHTML = "Password Updated";
  }, 1200);
});

</script>

</body>
</html>
